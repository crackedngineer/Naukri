name: Run Daily Naukri Profile Update Script

on:
  push:
    branches:
      - development
  schedule:
    - cron: "20 4 * * *"  
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    services:
      selenium:
        image: selenium/standalone-chrome

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: development

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Build Docker image
        run: docker build -t selenium-app -f .github/workflows/Dockerfile .

      - name: Run container
        run: docker run selenium-app